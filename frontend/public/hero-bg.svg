  <ellipse cx="1150" cy="220" rx="400" ry="320" fill="url(#centerGlow)" opacity="0.45"/>
  <ellipse cx="720" cy="650" rx="500" ry="280" fill="url(#centerGlow)" opacity="0.2"/>

